            - generic [ref=e53]:
              - paragraph [ref=e54]: SD Networking Events is San Diego’s premier networking organization, founded by James Hickey, a seasoned digital marketing strategist and entrepreneur with over 18 years of experience. We host 24 events annually, including business mixers, showcases, expos, and summits—connecting business owners, entrepreneurs, and startups to foster growth and innovation. Our network reaches over 150,000+ professionals across San Diego, providing unparalleled opportunities for networking, learning, and collaboration.
              - paragraph [ref=e55]: Mission Statement
              - paragraph [ref=e56]: Our mission is to empower San Diego’s business community by creating dynamic platforms where entrepreneurs, business owners, and startups can connect, collaborate, and thrive. Through curated events and strategic partnerships, we aim to drive economic growth and support local businesses throughout the region.
